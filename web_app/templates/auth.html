<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Clintelligence</title>
    <meta name="description" content="Sign in to Clintelligence - AI-powered clinical trial protocol intelligence.">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#FFF7ED', 100: '#FFEDD5', 200: '#FED7AA', 300: '#FDBA74',
                            400: '#FB923C', 500: '#F45900', 600: '#EA580C', 700: '#C2410C',
                            800: '#9A3412', 900: '#7C2D12',
                        },
                        secondary: {
                            50: '#EEF2FF', 100: '#E0E7FF', 200: '#C7D2FE', 300: '#A5B4FC',
                            400: '#818CF8', 500: '#314DD8', 600: '#4F46E5', 700: '#4338CA',
                            800: '#3730A3', 900: '#312E81',
                        },
                        navy: { 700: '#334155', 800: '#1E293B', 900: '#0F172A', 950: '#020617' }
                    },
                    fontFamily: {
                        'display': ['Plus Jakarta Sans', 'sans-serif'],
                        'body': ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="h-full">
<div x-data="authPage()" x-init="init()" class="min-h-screen bg-gradient-to-br from-navy-900 via-navy-800 to-navy-900 flex items-center justify-center py-12 px-4">

    <!-- Background Elements -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-20 left-10 w-72 h-72 bg-primary-500/10 rounded-full blur-3xl"></div>
        <div class="absolute bottom-20 right-10 w-96 h-96 bg-secondary-500/10 rounded-full blur-3xl"></div>
    </div>

    <div class="relative w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center gap-3">
                <div class="w-12 h-12 bg-gradient-to-br from-primary-500 to-secondary-500 rounded-xl flex items-center justify-center">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                    </svg>
                </div>
                <span class="font-display font-bold text-2xl text-white">Clintelligence</span>
            </a>
        </div>

        <!-- Auth Card -->
        <div class="bg-white dark:bg-navy-800 rounded-2xl shadow-2xl border border-slate-200 dark:border-navy-700 overflow-hidden">

            <!-- Tabs -->
            <div class="flex border-b border-slate-200 dark:border-navy-700">
                <button
                    @click="mode = 'login'"
                    :class="mode === 'login' ? 'bg-primary-50 dark:bg-primary-900/20 text-primary-600 dark:text-primary-400 border-b-2 border-primary-500' : 'text-slate-500 hover:text-slate-700 dark:text-slate-400'"
                    class="flex-1 py-4 px-6 font-semibold text-sm transition-colors"
                >
                    Sign In
                </button>
                <button
                    @click="mode = 'register'"
                    :class="mode === 'register' ? 'bg-primary-50 dark:bg-primary-900/20 text-primary-600 dark:text-primary-400 border-b-2 border-primary-500' : 'text-slate-500 hover:text-slate-700 dark:text-slate-400'"
                    class="flex-1 py-4 px-6 font-semibold text-sm transition-colors"
                >
                    Create Account
                </button>
            </div>

            <div class="p-8">
                <!-- Error Message -->
                <div x-show="error" x-transition class="mb-6 p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl">
                    <div class="flex items-center gap-2 text-red-600 dark:text-red-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span class="text-sm font-medium" x-text="error"></span>
                    </div>
                </div>

                <!-- Success Message -->
                <div x-show="success" x-transition class="mb-6 p-4 bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-200 dark:border-emerald-800 rounded-xl">
                    <div class="flex items-center gap-2 text-emerald-600 dark:text-emerald-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                        </svg>
                        <span class="text-sm font-medium" x-text="success"></span>
                    </div>
                </div>

                <!-- Login Form -->
                <form x-show="mode === 'login'" @submit.prevent="login" class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Email</label>
                        <input
                            type="email"
                            x-model="loginEmail"
                            required
                            class="w-full px-4 py-3 bg-slate-50 dark:bg-navy-700 border border-slate-200 dark:border-navy-600 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all text-navy-900 dark:text-white"
                            placeholder="you@example.com"
                        >
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Password</label>
                        <input
                            type="password"
                            x-model="loginPassword"
                            required
                            class="w-full px-4 py-3 bg-slate-50 dark:bg-navy-700 border border-slate-200 dark:border-navy-600 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all text-navy-900 dark:text-white"
                            placeholder="Enter your password"
                        >
                    </div>
                    <button
                        type="submit"
                        :disabled="isLoading"
                        class="w-full py-4 bg-gradient-to-r from-primary-500 to-primary-600 hover:from-primary-600 hover:to-primary-700 text-white font-semibold rounded-xl transition-all shadow-lg shadow-primary-500/30 hover:shadow-xl disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                    >
                        <svg x-show="isLoading" class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span x-text="isLoading ? 'Signing in...' : 'Sign In'"></span>
                    </button>
                </form>

                <!-- Register Form -->
                <form x-show="mode === 'register'" @submit.prevent="register" class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Full Name</label>
                        <input
                            type="text"
                            x-model="registerName"
                            required
                            class="w-full px-4 py-3 bg-slate-50 dark:bg-navy-700 border border-slate-200 dark:border-navy-600 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all text-navy-900 dark:text-white"
                            placeholder="John Smith"
                        >
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Email</label>
                        <input
                            type="email"
                            x-model="registerEmail"
                            required
                            class="w-full px-4 py-3 bg-slate-50 dark:bg-navy-700 border border-slate-200 dark:border-navy-600 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all text-navy-900 dark:text-white"
                            placeholder="you@example.com"
                        >
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Organization (Optional)</label>
                        <input
                            type="text"
                            x-model="registerOrg"
                            class="w-full px-4 py-3 bg-slate-50 dark:bg-navy-700 border border-slate-200 dark:border-navy-600 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all text-navy-900 dark:text-white"
                            placeholder="Pharma Corp"
                        >
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Password</label>
                        <input
                            type="password"
                            x-model="registerPassword"
                            required
                            minlength="6"
                            class="w-full px-4 py-3 bg-slate-50 dark:bg-navy-700 border border-slate-200 dark:border-navy-600 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all text-navy-900 dark:text-white"
                            placeholder="Min 6 characters"
                        >
                    </div>
                    <button
                        type="submit"
                        :disabled="isLoading"
                        class="w-full py-4 bg-gradient-to-r from-primary-500 to-primary-600 hover:from-primary-600 hover:to-primary-700 text-white font-semibold rounded-xl transition-all shadow-lg shadow-primary-500/30 hover:shadow-xl disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                    >
                        <svg x-show="isLoading" class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span x-text="isLoading ? 'Creating account...' : 'Create Account'"></span>
                    </button>
                </form>

                <!-- Divider -->
                <div class="mt-8 pt-6 border-t border-slate-200 dark:border-navy-700 text-center">
                    <p class="text-sm text-slate-500 dark:text-slate-400">
                        <span x-show="mode === 'login'">
                            Don't have an account?
                            <button @click="mode = 'register'" class="text-primary-600 dark:text-primary-400 font-semibold hover:underline">Create one</button>
                        </span>
                        <span x-show="mode === 'register'">
                            Already have an account?
                            <button @click="mode = 'login'" class="text-primary-600 dark:text-primary-400 font-semibold hover:underline">Sign in</button>
                        </span>
                    </p>
                </div>
            </div>
        </div>

        <!-- Back Link -->
        <div class="mt-6 text-center">
            <a href="/" class="text-slate-400 hover:text-white text-sm transition-colors inline-flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to home
            </a>
        </div>
    </div>
</div>

<script>
function authPage() {
    return {
        mode: 'login',
        isLoading: false,
        error: '',
        success: '',

        // Login fields
        loginEmail: '',
        loginPassword: '',

        // Register fields
        registerName: '',
        registerEmail: '',
        registerOrg: '',
        registerPassword: '',

        init() {
            // Check URL params for mode
            const params = new URLSearchParams(window.location.search);
            if (params.get('mode') === 'register') {
                this.mode = 'register';
            }

            // Check if already logged in
            const token = localStorage.getItem('auth_token');
            if (token) {
                this.checkToken(token);
            }
        },

        async checkToken(token) {
            try {
                const response = await fetch('/api/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    // Already logged in, redirect to dashboard
                    window.location.href = '/home';
                }
            } catch (e) {
                // Token invalid, continue with auth page
                localStorage.removeItem('auth_token');
            }
        },

        async login() {
            this.error = '';
            this.success = '';
            this.isLoading = true;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: this.loginEmail,
                        password: this.loginPassword
                    })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('auth_token', data.token);
                    localStorage.setItem('auth_user', JSON.stringify(data.user));
                    this.success = 'Login successful! Redirecting...';
                    setTimeout(() => {
                        window.location.href = '/home';
                    }, 500);
                } else {
                    this.error = data.error || 'Login failed';
                }
            } catch (err) {
                this.error = 'Network error. Please try again.';
            } finally {
                this.isLoading = false;
            }
        },

        async register() {
            this.error = '';
            this.success = '';
            this.isLoading = true;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: this.registerEmail,
                        password: this.registerPassword,
                        full_name: this.registerName,
                        organization: this.registerOrg || null
                    })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('auth_token', data.token);
                    localStorage.setItem('auth_user', JSON.stringify(data.user));
                    this.success = 'Account created! Redirecting...';
                    setTimeout(() => {
                        window.location.href = '/home';
                    }, 500);
                } else {
                    this.error = data.error || 'Registration failed';
                }
            } catch (err) {
                this.error = 'Network error. Please try again.';
            } finally {
                this.isLoading = false;
            }
        }
    };
}
</script>
</body>
</html>
